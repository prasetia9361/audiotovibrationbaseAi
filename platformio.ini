; ================================================================
; PlatformIO Project Configuration File
; Audio-to-Vibration AI — Alat Bantu Tuna Rungu
;
; config.h ada di lib/AppConfig/config.h — otomatis ditemukan
; oleh semua library dan src/ tanpa perlu flag -I tambahan.
; ================================================================

; ----------------------------------------------------------------
; Shared defaults
; ----------------------------------------------------------------
[env]
platform      = espressif32
framework     = arduino
monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I ${PROJECT_DIR}/src

; ----------------------------------------------------------------
; ENV 1 — Aplikasi utama | board: XIAO ESP32-S3
; ----------------------------------------------------------------
[env:seeed_xiao_esp32s3]
board = seeed_xiao_esp32s3

build_src_filter =
    +<*>
    -<SampleGetter/>

lib_deps =
    kosme/arduinoFFT@^2.0.2

; ----------------------------------------------------------------
; ENV 2 — Ambil data training | board: XIAO ESP32-S3
; ----------------------------------------------------------------
[env:seeed_xiao_esp32s3_sampler]
board = seeed_xiao_esp32s3

build_src_filter =
    +<*>
    -<MainApp/>

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I ${PROJECT_DIR}/src
    -DSAMPLER_MODE

lib_ignore = SoundClassifier, VibrationMotor

lib_deps =

; ----------------------------------------------------------------
; ENV 3 — Ambil data training | board: ESP32-S3 DevKit (generik)
;
; Sambungan INMP441:
;   SCK → GPIO2  |  WS → GPIO3  |  SD → GPIO4  |  VCC → 3.3V  |  L/R → GND
; Button: GPIO13 → GND
; ----------------------------------------------------------------
[env:esp32s3_sampler]
board = esp32-s3-devkitc-1

build_src_filter =
    +<*>
    -<MainApp/>

build_flags =
    -DBOARD_HAS_PSRAM
    -I ${PROJECT_DIR}/src
    -DSAMPLER_MODE
    -DGENERIC_ESP32S3
lib_ignore = SoundClassifier, VibrationMotor

board_build.partitions = huge_app.csv
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
